<!DOCTYPE html>
<!--
  Docsify + VS Code dark theme template
  ─────────────────────────────────────
  Usage:
    1. Copy this file to your repo root
    2. Rename it to index.html
    3. Replace the placeholders:
         SITE_TITLE      → your site title (e.g. "KpihX Ubuntu Live")
         SITE_NAME       → sidebar display name (e.g. "🐧 KpihX Ubuntu Live")
         GITHUB_REPO_URL → full GitHub repo URL (e.g. "https://github.com/kpihx/tutos_live")
         SEARCH_PLACEHOLDER → search box hint (e.g. "🔍 Search tutorials...")
    4. Also create _sidebar.md and .nojekyll at repo root (see github-pages.md)
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SITE_TITLE</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="SITE_TITLE">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css" />
  <style>
    /* --- VS CODE STYLE UI --- */

    .sidebar {
      display: flex !important;
      flex-direction: column !important;
      background-color: var(--sidebar-background) !important;
    }

    .app-name {
      order: 1 !important;
      margin-top: 20px !important;
      font-weight: bold !important;
      font-size: 1.5rem !important;
    }

    .search {
      order: 2 !important;
      margin-bottom: 20px !important;
    }

    .sidebar-nav {
      order: 3 !important;
      flex: 1 !important;
    }

    #docsify-darklight-theme {
      top: 15px !important;
      right: 15px !important;
      width: 28px !important;
      height: 28px !important;
      box-shadow: 0 0 5px rgba(0,0,0,0.3) !important;
    }

    .search input {
      background-color: var(--codeBackgroundColor) !important;
      border: 1px solid var(--borderColor) !important;
      color: var(--textColor) !important;
      border-radius: 3px !important;
    }

    /* Inline code readability — prevents blue codeTypeColor override on p/li/blockquote code */
    p code, li code, td code, blockquote code,
    h1 code, h2 code, h3 code, h4 code {
      background-color: var(--codeBackgroundColor) !important;
      color: var(--codeTextColor) !important;
      padding: 2px 6px !important;
      border-radius: 3px !important;
      font-size: 0.875em !important;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'SITE_NAME',
      repo: 'GITHUB_REPO_URL',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      themeColor: '#007acc',
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'SEARCH_PLACEHOLDER',
        noData: '❌ No results found.',
        depth: 6
      },
      darklightTheme: {
        siteFont: "Segoe UI, Tahoma, Geneva, Verdana, sans-serif",
        defaultTheme: 'dark',
        codeFontFamily: 'Consolas, Monaco, "Andale Mono", "Ubuntu Mono", monospace',
        bodyFontSize: '16px',
        dark: {
          accent: '#007acc',
          background: '#1e1e1e',
          sidebarBackground: '#252526',
          textColor: '#d4d4d4',
          codeTextColor: '#ce9178',
          codeBackgroundColor: '#2d2d2d',
          borderColor: '#333333',
          blockQuoteColor: '#6a9955',
          highlightColor: '#264f78',
          sidebarSubColor: '#cccccc',
          codeTypeColor: '#ce9178',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/sun.svg)'
        },
        light: {
          accent: '#007acc',
          background: '#ffffff',
          sidebarBackground: '#f3f3f3',
          textColor: '#333333',
          codeTextColor: '#c7254e',
          codeBackgroundColor: '#f0f0f0',
          borderColor: 'rgba(0,0,0,.1)',
          blockQuoteColor: '#858585',
          highlightColor: '#e7f3ff',
          sidebarSubColor: '#666666',
          codeTypeColor: '#c7254e',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/icons/moon.svg)'
        }
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-ini.min.js"></script>
</body>
</html>
